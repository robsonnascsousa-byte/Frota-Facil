<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <!-- CARFLIPPING.BR — PRIMARY LOGO (horizontal lockup, dark bg) -->
  <rect width="600" height="160" fill="#0a0a0a"/>

  <!-- Monogram -->
  <g transform="translate(30, 30)">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#ff2a2a" stroke-width="3"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#f5f1ea" stroke-width="1"/>
    <!-- bidirectional arrows -->
    <path d="M 28 50 L 72 50" stroke="#f5f1ea" stroke-width="4" stroke-linecap="square"/>
    <path d="M 65 42 L 72 50 L 65 58" stroke="#ff2a2a" stroke-width="4" fill="none" stroke-linejoin="miter"/>
    <path d="M 35 42 L 28 50 L 35 58" stroke="#ff2a2a" stroke-width="4" fill="none" stroke-linejoin="miter"/>
    <!-- odometer ticks -->
    <line x1="50" y1="8" x2="50" y2="14" stroke="#f5f1ea" stroke-width="2"/>
    <line x1="50" y1="86" x2="50" y2="92" stroke="#f5f1ea" stroke-width="2"/>
    <line x1="8" y1="50" x2="14" y2="50" stroke="#f5f1ea" stroke-width="2"/>
    <line x1="86" y1="50" x2="92" y2="50" stroke="#f5f1ea" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(155, 60)">
    <text x="0" y="0" font-family="Archivo Black, Impact, sans-serif" font-weight="900" font-size="54" fill="#f5f1ea" letter-spacing="-1.5">CARFLIPPING</text>
    <text x="0" y="32" font-family="JetBrains Mono, Courier, monospace" font-weight="700" font-size="13" fill="#ff2a2a" letter-spacing="3">— .BR — BUY · DRIVE · FLIP</text>
  </g>
</svg>
