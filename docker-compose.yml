version: '3.8'

services:
  frotafacil:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: frotafacil
    restart: unless-stopped
    ports:
      - "3080:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
