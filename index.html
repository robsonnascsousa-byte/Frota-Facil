<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARFLIPPING.BR — Gestão de Frota</title>
    <meta name="description" content="Sistema de gestão de frota CARFLIPPING.BR. Locação inteligente e flip automotivo." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              'display': ['"Archivo Black"', 'sans-serif'],
              'heading': ['"Bebas Neue"', 'sans-serif'],
              'mono': ['"JetBrains Mono"', 'monospace'],
              'body': ['"Inter"', 'sans-serif'],
            },
            colors: {
              'carbon': {
                DEFAULT: '#0a0a0a',
                'light': '#141414',
              },
              'red-line': {
                DEFAULT: '#ff2a2a',
                'deep': '#c40000',
                '50': '#fff1f1',
                '100': '#ffe0e0',
                '200': '#ffc7c7',
                '300': '#ffa0a0',
                '400': '#ff6b6b',
                '500': '#ff2a2a',
                '600': '#ed1515',
                '700': '#c40000',
                '800': '#a30d0d',
                '900': '#871212',
                '950': '#4a0404',
              },
              'bone': {
                DEFAULT: '#f5f1ea',
                'dark': '#e8e2d8',
              },
              'gunmetal': {
                DEFAULT: '#2a2a2a',
                'light': '#3a3a3a',
              },
              // Map petrol-blue to red-line for backward compatibility
              'petrol-blue': {
                '50': '#fff1f1',
                '100': '#ffe0e0',
                '200': '#ffc7c7',
                '300': '#ffa0a0',
                '400': '#ff6b6b',
                '500': '#ff2a2a',
                '600': '#ed1515',
                '700': '#c40000',
                '800': '#a30d0d',
                '900': '#871212',
                '950': '#4a0404',
              },
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
              'slide-in': 'slideIn 0.3s ease-out forwards',
              'pulse-red': 'pulseRed 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateX(-100%)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              pulseRed: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              },
            },
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

  </body>
</html>
